<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="BikeTracker"/>
  <meta name="theme-color" content="#FFD600"/>
  <title>BikeTracker</title>
  <link rel="apple-touch-icon" href="icon.png"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;background:#F5F3EF;color:#1A1A1A;overflow:hidden}
:root{
  --yellow:#FFD600;--coral:#FF6B5B;--coral-dim:rgba(255,107,91,0.12);
  --amber:#FF9F0A;--amber-dim:rgba(255,159,10,0.12);
  --green:#34C759;--green-dim:rgba(52,199,89,0.12);
  --charcoal:#1A1A1A;--charcoal2:#2A2A2A;
  --bg:#F5F3EF;--surface:#FFFFFF;--surface2:#F0EEE9;--border:#E5E2DA;
  --text:#1A1A1A;--text2:#5A5A5A;--text3:#9A9895;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);--sar:env(safe-area-inset-right,0px);
  --tap:48px;--r:12px;--rl:20px;
}
#root{display:flex;flex-direction:column;max-width:430px;margin:0 auto;padding-left:var(--sal);padding-right:var(--sar);background:var(--bg)}
.hdr{flex-shrink:0;background:var(--yellow);padding-top:calc(var(--sat) + 16px);padding-left:20px;padding-right:20px;padding-bottom:0;position:relative;z-index:40}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:10px}
.hdr-wordmark{font-size:15px;font-weight:800;color:var(--charcoal);letter-spacing:-0.3px;flex-shrink:0}
.hdr-bike{font-size:13px;font-weight:600;color:rgba(26,26,26,0.55);flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.hdr-hero{padding-bottom:24px}
.hdr-hero-label{font-size:11px;font-weight:700;color:rgba(26,26,26,0.5);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px}
.hdr-hero-num{font-size:60px;font-weight:800;color:var(--charcoal);letter-spacing:-3px;line-height:1}
.hdr-hero-unit{font-size:20px;font-weight:700;color:rgba(26,26,26,0.5);margin-left:3px}
.hdr-hero-sub{font-size:13px;color:rgba(26,26,26,0.5);margin-top:5px;font-weight:500}
.hdr-tabs{display:flex;gap:6px;padding-bottom:16px;overflow-x:auto;scrollbar-width:none}
.hdr-tabs::-webkit-scrollbar{display:none}
.hdr-tab{height:34px;padding:0 16px;border-radius:999px;border:none;font:600 13px/1 -apple-system,sans-serif;cursor:pointer;transition:background 0.15s,color 0.15s;-webkit-tap-highlight-color:transparent;background:rgba(26,26,26,0.1);color:rgba(26,26,26,0.5);white-space:nowrap;flex-shrink:0}
.hdr-tab.active{background:var(--charcoal);color:var(--yellow)}
.page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px;padding-bottom:calc(20px + var(--sab))}
.page::-webkit-scrollbar{display:none}
.nav{flex-shrink:0;background:var(--charcoal);display:flex;padding-bottom:var(--sab)}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;min-height:56px;background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.3);transition:color 0.15s;-webkit-tap-highlight-color:transparent;padding:10px 4px}
.nav-tab.active{color:var(--yellow)}
.nav-tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-tab-lbl{font-size:10px;font-weight:700;letter-spacing:0.3px;text-transform:uppercase}
.cta-pill{display:flex;align-items:center;justify-content:space-between;background:var(--yellow);border-radius:999px;padding:14px 16px 14px 22px;margin-bottom:18px;border:none;width:100%;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform 0.1s,opacity 0.15s}
.cta-pill:active{transform:scale(0.98);opacity:0.9}
.cta-pill-text{font:700 17px/1 -apple-system,sans-serif;color:var(--charcoal)}
.cta-pill-sub{font-size:12px;color:rgba(26,26,26,0.5);margin-top:3px;font-weight:500}
.cta-pill-icon{width:40px;height:40px;border-radius:50%;background:var(--charcoal);color:var(--yellow);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:24px;font-weight:300;line-height:1}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.sc-dark{background:var(--charcoal);border-radius:var(--r);padding:18px}
.sc-light{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.sc-val{font-size:28px;font-weight:800;letter-spacing:-1px;line-height:1}
.sc-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-top:5px}
.sc-dark .sc-val{color:#fff}.sc-dark .sc-lbl{color:rgba(255,255,255,0.4)}
.sc-light .sc-val{color:var(--charcoal)}.sc-light .sc-lbl{color:var(--text3)}
.alert-strip{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border-radius:var(--r);margin-bottom:10px;font-size:14px;line-height:1.5}
.alert-strip.danger{background:var(--coral-dim);border:1px solid rgba(255,107,91,0.2)}
.alert-strip.warn{background:var(--amber-dim);border:1px solid rgba(255,159,10,0.2)}
.a-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.alert-strip.danger .a-dot{background:var(--coral)}
.alert-strip.warn .a-dot{background:var(--amber)}
.a-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.alert-strip.danger .a-lbl{color:var(--coral)}
.alert-strip.warn .a-lbl{color:var(--amber)}
.a-names{font-size:13px;color:var(--text2);margin-top:1px}
.sec{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;margin-top:6px}
.sec-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px}
.comp-card{background:var(--charcoal);border-radius:var(--rl);padding:18px;margin-bottom:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity 0.15s;position:relative;overflow:hidden}
.comp-card:active{opacity:0.85}
.comp-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:var(--rl) 0 0 var(--rl)}
.comp-card.ok::before{background:var(--green)}
.comp-card.warning::before{background:var(--amber)}
.comp-card.overdue::before{background:var(--coral)}
.comp-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.comp-name{font-size:16px;font-weight:700;color:#fff}
.comp-sub{font-size:12px;color:rgba(255,255,255,0.4);margin-top:3px}
.prog{margin:14px 0 10px}
.prog-row{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:6px}
.prog-track{height:5px;background:rgba(255,255,255,0.12);border-radius:999px;position:relative;overflow:visible}
.prog-fill{height:100%;border-radius:999px;transition:width 0.5s ease;min-width:5px}
.prog-fill.ok{background:var(--green)}.prog-fill.warning{background:var(--amber)}.prog-fill.overdue{background:var(--coral)}
.prog-marker{position:absolute;top:-3px;width:2px;height:11px;background:rgba(255,255,255,0.2);border-radius:1px}
.comp-footer{display:flex;align-items:center;justify-content:space-between}
.comp-serviced{font-size:11px;color:rgba(255,255,255,0.35)}
.badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;padding:3px 9px;border-radius:999px}
.badge.ok{background:var(--green-dim);color:var(--green)}
.badge.warning{background:var(--amber-dim);color:var(--amber)}
.badge.overdue{background:var(--coral-dim);color:var(--coral)}
.ride-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px}
.ride-bar{width:3px;border-radius:999px;background:var(--yellow);align-self:stretch;min-height:36px;flex-shrink:0}
.ride-body{flex:1;min-width:0}
.ride-dist{font-size:17px;font-weight:800;color:var(--charcoal);letter-spacing:-0.5px}
.ride-dur{font-size:13px;color:var(--text2);font-weight:500;margin-left:8px}
.ride-notes{font-size:12px;color:var(--text3);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ride-date{font-size:11px;color:var(--text3);margin-top:4px}
.ride-acts{display:flex;flex-direction:column;gap:2px;flex-shrink:0;align-items:flex-end}
.tact{background:none;border:none;font:600 13px/1 -apple-system,sans-serif;cursor:pointer;padding:10px 2px;-webkit-tap-highlight-color:transparent}
.tact.yd{color:var(--yellow)}.tact.mt{color:var(--text3)}.tact.danger{color:var(--coral)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.15s ease}
.sheet{background:var(--surface);border-radius:28px 28px 0 0;width:100%;max-width:430px;max-height:calc(100dvh - 60px);display:flex;flex-direction:column;animation:slideUp 0.22s cubic-bezier(0.4,0,0.2,1);overflow:hidden}
.sh-hdr{background:var(--yellow);padding:16px 20px 20px;flex-shrink:0}
.sh-hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.sh-title{font-size:26px;font-weight:800;color:var(--charcoal);letter-spacing:-0.8px;line-height:1.1}
.sh-sub{font-size:13px;color:rgba(26,26,26,0.55);font-weight:500}
.sh-close{background:rgba(26,26,26,0.12);border:none;border-radius:50%;width:32px;height:32px;font-size:18px;color:var(--charcoal);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.sh-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 20px 16px}
.sh-body::-webkit-scrollbar{display:none}
.sh-foot{flex-shrink:0;padding:12px 20px;padding-bottom:calc(16px + var(--sab));background:var(--surface);border-top:1px solid var(--border);display:flex;gap:10px}
.field{margin-bottom:24px}.field:last-child{margin-bottom:0}
.lbl{display:block;font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px}
.inp{width:100%;height:48px;padding:0 0 8px;background:transparent;border:none;border-bottom:1.5px solid var(--border);color:var(--text);font:400 17px/1 -apple-system,sans-serif;outline:none;-webkit-appearance:none;transition:border-color 0.15s;border-radius:0}
.inp:focus{border-bottom-color:var(--charcoal)}.inp.err{border-bottom-color:var(--coral)}.inp::placeholder{color:var(--text3)}
.ta{width:100%;min-height:96px;padding:12px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font:400 16px/1.5 -apple-system,sans-serif;outline:none;resize:vertical;-webkit-appearance:none;transition:border-color 0.15s}
.ta:focus{border-color:var(--charcoal)}.ta::placeholder{color:var(--text3)}
.inp-hint{font-size:12px;color:var(--text3);margin-top:6px;line-height:1.4}
.inp-err{font-size:12px;color:var(--coral);margin-top:6px}
.seg{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:3px;gap:3px}
.seg-o{flex:1;height:38px;border:none;border-radius:999px;font:600 14px/1 -apple-system,sans-serif;cursor:pointer;color:var(--text3);background:transparent;transition:background 0.15s,color 0.15s;-webkit-tap-highlight-color:transparent}
.seg-o.on{background:var(--charcoal);color:var(--yellow)}
.btn{display:inline-flex;align-items:center;justify-content:center;min-height:var(--tap);padding:0 22px;border:none;border-radius:999px;font:700 15px/1 -apple-system,sans-serif;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;transition:opacity 0.15s,transform 0.1s}
.btn:active{transform:scale(0.97);opacity:0.88}.btn:disabled{opacity:0.35;pointer-events:none}
.btn-p{background:var(--yellow);color:var(--charcoal);flex:1}
.btn-g{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-d{background:var(--coral-dim);color:var(--coral);border:1px solid rgba(255,107,91,0.2)}
.swatches{display:flex;flex-wrap:wrap;gap:10px}
.swatch{width:34px;height:34px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.15s,border-color 0.15s;-webkit-tap-highlight-color:transparent}
.swatch.on{border-color:var(--charcoal);transform:scale(1.2)}
.ds-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}
.ds{background:var(--surface2);border-radius:var(--r);padding:12px 8px;text-align:center}
.ds-v{font-size:15px;font-weight:800;color:var(--charcoal)}
.ds-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.4px;margin-top:4px}
.log-item{border-left:3px solid var(--yellow);background:var(--surface2);border-radius:0 var(--r) var(--r) 0;padding:10px 14px;margin-bottom:10px}
.log-date{font-size:11px;color:var(--text3);margin-bottom:4px}
.log-note{font-size:14px;color:var(--text);line-height:1.5}
.set-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:14px}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border);gap:12px}
.set-row:last-child{border-bottom:none}
.set-lbl{font-size:15px;font-weight:600;color:var(--text)}
.set-sub{font-size:12px;color:var(--text3);margin-top:2px}
.bike-row{display:flex;align-items:center;padding:16px;border-bottom:1px solid var(--border);gap:12px}
.bike-row:last-child{border-bottom:none}
.bdot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.b-name{font-size:15px;font-weight:600;color:var(--text)}
.b-sub{font-size:12px;color:var(--text3);margin-top:2px}
.month-lbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;padding:14px 0 8px}
.welcome-zone{background:var(--yellow);padding:calc(var(--sat) + 48px) 28px 36px;flex-shrink:0}
.welcome-title{font-size:42px;font-weight:800;color:var(--charcoal);letter-spacing:-2px;line-height:1.1;margin-bottom:8px}
.welcome-sub{font-size:15px;color:rgba(26,26,26,0.55);font-weight:500}
.empty{text-align:center;padding:48px 20px}
.empty-title{font-size:19px;font-weight:700;color:var(--text);margin-bottom:8px}
.empty-sub{font-size:14px;color:var(--text3);line-height:1.6;margin-bottom:28px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
*{max-width:100%}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useReducer,useContext,createContext,useRef}=React;
const SK="biketracker_v5";
const COLS=["#FFD600","#FF6B5B","#C77DFF","#4A90D9","#00C2A8","#34C759","#FF9F0A","#636366"];
const stor={load(){try{const r=localStorage.getItem(SK);return r?JSON.parse(r):null}catch{return null}},save(s){try{localStorage.setItem(SK,JSON.stringify(s))}catch(e){console.error(e)}}};
const U={
  kmToMi:km=>km*0.621371,miToKm:mi=>mi/0.621371,
  fmtDist(km,u){return u==="mi"?`${(km*0.621371).toFixed(1)} mi`:`${km.toFixed(1)} km`},
  fmtDur(m){const h=Math.floor(m/60),mn=Math.round(m%60);if(!h)return`${mn}m`;if(!mn)return`${h}h`;return`${h}h ${mn}m`},
  parseHHMM(s){if(!s)return 0;const[h,m]=String(s).split(":");return(parseInt(h)||0)*60+Math.min(parseInt(m)||0,59)},
  toHHMM(m){const h=Math.floor(m/60),mn=Math.round(m%60);return`${String(h).padStart(2,"0")}:${String(mn).padStart(2,"0")}`},
  fmtInterval(c,u){return c.intervalType==="distance"?U.fmtDist(c.intervalValue,u):U.fmtDur(c.intervalValue)},
  fmtAccum(c,u){return c.intervalType==="distance"?U.fmtDist(c.accumulated,u):U.fmtDur(c.accumulated)},
};
function gStatus(c){
  const pct=Math.min((c.accumulated/c.intervalValue)*100,100);
  const rem=Math.max(c.intervalValue-c.accumulated,0);
  let s="ok";if(c.accumulated>=c.intervalValue)s="overdue";else if(rem<=c.warnBuffer)s="warning";
  return{pct,status:s,remaining:rem};
}
function makeSeed(){
  const id=crypto.randomUUID(),now=new Date().toISOString();
  return{bikes:[{id,name:"Trek Domane SL5",color:"#FFD600",createdAt:now,
    components:[
      {id:crypto.randomUUID(),name:"Chain",intervalType:"distance",intervalValue:500,warnBuffer:100,accumulated:427,serviceLog:[]},
      {id:crypto.randomUUID(),name:"Fork Service",intervalType:"time",intervalValue:3000,warnBuffer:300,accumulated:2450,serviceLog:[]},
      {id:crypto.randomUUID(),name:"Brake Pads",intervalType:"distance",intervalValue:1500,warnBuffer:200,accumulated:620,serviceLog:[]},
      {id:crypto.randomUUID(),name:"Rear Derailleur Cable",intervalType:"distance",intervalValue:2000,warnBuffer:250,accumulated:580,serviceLog:[]},
      {id:crypto.randomUUID(),name:"Tubeless Sealant",intervalType:"time",intervalValue:360,warnBuffer:60,accumulated:185,serviceLog:[]},
    ],
    rides:[
      {id:crypto.randomUUID(),distanceKm:42,durationMinutes:95,date:now,notes:"Morning loop, great conditions"},
      {id:crypto.randomUUID(),distanceKm:28,durationMinutes:60,date:now,notes:""},
    ]
  }],activeBikeId:id,distanceUnit:"km"};
}
function reducer(state,action){
  switch(action.type){
    case"SET_ACTIVE":return{...state,activeBikeId:action.id};
    case"TOGGLE_UNIT":return{...state,distanceUnit:state.distanceUnit==="km"?"mi":"km"};
    case"ADD_BIKE":{const b={id:crypto.randomUUID(),name:action.name,color:action.color,components:[],rides:[],createdAt:new Date().toISOString()};return{...state,bikes:[...state.bikes,b],activeBikeId:b.id}}
    case"EDIT_BIKE":return{...state,bikes:state.bikes.map(b=>b.id!==action.id?b:{...b,name:action.name,color:action.color})};
    case"DELETE_BIKE":{const r=state.bikes.filter(b=>b.id!==action.id);return{...state,bikes:r,activeBikeId:r[0]?.id??null}}
    case"ADD_RIDE":{const ride={id:crypto.randomUUID(),distanceKm:+action.data.distanceKm,durationMinutes:+action.data.durationMinutes,date:new Date().toISOString(),notes:action.data.notes||""};return{...state,bikes:state.bikes.map(b=>{if(b.id!==action.bikeId)return b;return{...b,rides:[ride,...b.rides],components:b.components.map(c=>({...c,accumulated:c.accumulated+(c.intervalType==="distance"?ride.distanceKm:ride.durationMinutes)}))}})};}
    case"EDIT_RIDE":return{...state,bikes:state.bikes.map(b=>{if(b.id!==action.bikeId)return b;const old=b.rides.find(r=>r.id===action.rideId);if(!old)return b;const nd=+action.data.distanceKm,nt=+action.data.durationMinutes;return{...b,rides:b.rides.map(r=>r.id!==action.rideId?r:{...r,distanceKm:nd,durationMinutes:nt,notes:action.data.notes??r.notes}),components:b.components.map(c=>({...c,accumulated:Math.max(0,c.accumulated+(c.intervalType==="distance"?nd-old.distanceKm:nt-old.durationMinutes))}))}})};
    case"DELETE_RIDE":return{...state,bikes:state.bikes.map(b=>{if(b.id!==action.bikeId)return b;const ride=b.rides.find(r=>r.id===action.rideId);if(!ride)return b;return{...b,rides:b.rides.filter(r=>r.id!==action.rideId),components:b.components.map(c=>({...c,accumulated:Math.max(0,c.accumulated-(c.intervalType==="distance"?ride.distanceKm:ride.durationMinutes))}))}})};
    case"ADD_COMP":{const c={id:crypto.randomUUID(),...action.data,accumulated:0,serviceLog:[]};return{...state,bikes:state.bikes.map(b=>b.id!==action.bikeId?b:{...b,components:[...b.components,c]})}}
    case"EDIT_COMP":return{...state,bikes:state.bikes.map(b=>b.id!==action.bikeId?b:{...b,components:b.components.map(c=>c.id!==action.compId?c:{...c,...action.data})})};
    case"DELETE_COMP":return{...state,bikes:state.bikes.map(b=>b.id!==action.bikeId?b:{...b,components:b.components.filter(c=>c.id!==action.compId)})};
    case"SERVICE_COMP":return{...state,bikes:state.bikes.map(b=>b.id!==action.bikeId?b:{...b,components:b.components.map(c=>c.id!==action.compId?c:{...c,accumulated:0,serviceLog:[{id:crypto.randomUUID(),date:new Date().toISOString(),note:action.note||""},...c.serviceLog]})})};
    case"IMPORT":return action.state;
    default:return state;
  }
}
const Ctx=createContext(null);
function AppProvider({children}){
  const[state,dispatch]=useReducer(reducer,null,()=>stor.load()||makeSeed());
  useEffect(()=>{stor.save(state)},[state]);
  const activeBike=state.bikes.find(b=>b.id===state.activeBikeId)??null;
  return <Ctx.Provider value={{state,dispatch,activeBike}}>{children}</Ctx.Provider>;
}
const useApp=()=>useContext(Ctx);

function DurInput({value,onChange,hasErr}){
  function h(e){let v=e.target.value.replace(/[^\d:]/g,"");if(v.length===2&&!v.includes(":")&&(value||"").length<3)v+=":";if(v.includes(":")){const[,m]=v.split(":");if((m||"").length>2)return;}onChange(v);}
  return <input className={`inp${hasErr?" err":""}`} type="text" inputMode="numeric" placeholder="01:30" value={value} onChange={h} maxLength={5}/>;
}

function ProgBar({pct,status,warnPct}){

    <div className="prog">
      <div className="prog-row">
        <span>{Math.round(p)}% used</span>
        <span style={{color:status==="overdue"?"var(--coral)":status==="warning"?"var(--amber)":"rgba(255,255,255,0.4)"}}>{status==="overdue"?"Overdue":status==="warning"?"Due soon":"Good"}</span>
      </div>
      <div className="prog-track">
        {warnPct>2&&warnPct<98&&<div className="prog-marker" style={{left:`calc(${warnPct}% - 1px)`}}/>}
        <div className={`prog-fill ${status}`} style={{width:`${p}%`}}/>
      </div>
    </div>
  );
}

function RideSheet({bikeId,initial,onClose}){

function CompSheet({bikeId,initial,onClose}){

  const[wbuf,setWbuf]=useState(()=>{if(!initial)return"";return initial.intervalType==="time"?U.toHHMM(initial.warnBuffer):String(initial.warnBuffer);});
  const[errors,setErrors]=useState({});
  function chType(t){setItype(t);setIval("");setWbuf("");setErrors({});}
  function save(){
    const e={};if(!name.trim())e.name="Name is required";
    if(!ival)e.ival="Interval is required";

    </Sheet>
  );

      <div className="set-card">
        {state.bikes.map(b=>(
          <div key={b.id} className="bike-row"><div className="bdot" style={{background:b.color}}/><div style={{flex:1,minWidth:0}}><div className="b-name">{b.name}{b.id===state.activeBikeId&&<span style={{fontSize:10,color:"var(--yellow)",background:"var(--charcoal)",marginLeft:8,padding:"2px 8px",borderRadius:999,fontWeight:700}}>Active</span>}</div><div className="b-sub">{b.rides.length} rides · {b.components.length} components</div></div><div style={{display:"flex",gap:4}}>{b.id!==state.activeBikeId&&<button className="tact mt" style={{fontSize:13}} onClick={()=>dispatch({type:"SET_ACTIVE",id:b.id})}>Switch</button>}<button className="tact mt" style={{fontSize:13}} onClick={()=>setEditBike(b)}>Edit</button></div></div>
        ))}
      </div>
      <div className="sec"><div className="sec-title">Preferences</div></div>
      <div className="set-card">
        <div className="set-row"><div style={{flex:1}}><div className="set-lbl">Distance Unit</div><div className="set-sub">Showing in {state.distanceUnit==="km"?"kilometres":"miles"}</div></div><div className="seg" style={{width:110}}><button className={`seg-o${state.distanceUnit==="km"?" on":""}`} onClick={()=>state.distanceUnit!=="km"&&dispatch({type:"TOGGLE_UNIT"})}>km</button><button className={`seg-o${state.distanceUnit==="mi"?" on":""}`} onClick={()=>state.distanceUnit!=="mi"&&dispatch({type:"TOGGLE_UNIT"})}>mi</button></div></div>
      </div>
      <div className="sec"><div className="sec-title">Data</div></div>
      <div className="set-card">
        <div className="set-row"><div style={{flex:1}}><div className="set-lbl">Export Backup</div><div className="set-sub">Download all data as JSON</div></div><button className="btn btn-p" style={{minHeight:38,padding:"0 18px",fontSize:13}} onClick={exportData}>Export</button></div>
        <div className="set-row"><div style={{flex:1}}><div className="set-lbl">Import Backup</div><div className="set-sub">Restore from a previous export</div></div><button className="btn btn-g" style={{minHeight:38,padding:"0 18px",fontSize:13}} onClick={()=>fRef.current?.click()}>Import</button><input ref={fRef} type="file" accept=".json" style={{display:"none"}} onChange={importData}/></div>
      </div>
      <div className="sec"><div className="sec-title">About</div></div>
      <div className="set-card"><div style={{padding:16}}><div style={{fontSize:16,fontWeight:800,color:"var(--text)",marginBottom:8}}>BikeTracker</div><div style={{fontSize:14,color:"var(--text3)",lineHeight:1.7}}>Track service intervals for all your bike components. Log rides to automatically update counters and get warned before maintenance is due.<br/><br/>Your data lives privately in your browser. Export regularly to keep a safe copy.</div><div style={{fontSize:12,color:"var(--text3)",marginTop:12}}>Version 5.0</div></div></div>
      {showAdd&&<BikeSheet onClose={()=>setShowAdd(false)}/>}
      {editBike&&<BikeSheet initial={editBike} onClose={()=>setEditBike(null)}/>}
    </div>
  );
}

function App(){
  const{state,dispatch,activeBike}=useApp();
  const[tab,setTab]=useState("overview");
  const[logRide,setLogRide]=useState(false);
  const[addBike,setAddBike]=useState(false);
  const du=state.distanceUnit;
  const alertN=activeBike?activeBike.components.filter(c=>gStatus(c).status!=="ok").length:0;
  const totalKm=activeBike?activeBike.rides.reduce((s,r)=>s+r.distanceKm,0):0;
  const tabs=[
    {id:"overview",label:"Overview",svg:<><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></>},
    {id:"components",label:"Components",svg:<><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></>},
    {id:"rides",label:"Rides",svg:<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>},
    {id:"settings",label:"Settings",svg:<><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></>},
  ];
  if(!activeBike)return(
    <>
      <div className="welcome-zone"><div className="welcome-title">Bike{"\n"}Tracker</div><div className="welcome-sub">Track rides and keep your bike components serviced.</div></div>
      <div className="page" style={{display:"flex",flexDirection:"column",gap:16,paddingTop:32}}>
        <button className="btn btn-p" style={{width:"100%"}} onClick={()=>setAddBike(true)}>Add your first bike</button>
      </div>
      {addBike&&<BikeSheet onClose={()=>setAddBike(false)}/>}
    </>
  );
  return(
    <>
      <div className="hdr">
        <div className="hdr-top">
          <div className="hdr-wordmark">BikeTracker</div>
          <div className="hdr-bike">{activeBike.name}</div>
          <div className="hdr-actions">
            {alertN>0&&<div style={{width:8,height:8,borderRadius:"50%",background:"var(--coral)"}}/>}
            <button className="hdr-tab active" style={{height:32,fontSize:12}} onClick={()=>setLogRide(true)}>+ Ride</button>
          </div>
        </div>
        <div className="hdr-hero">
          <div className="hdr-hero-label">Total Distance</div>
          <div><span className="hdr-hero-num">{du==="mi"?(U.kmToMi(totalKm)).toFixed(0):totalKm.toFixed(0)}</span><span className="hdr-hero-unit">{du}</span></div>
          <div className="hdr-hero-sub">{activeBike.rides.length} rides · {activeBike.components.length} components</div>
        </div>
        <div className="hdr-tabs">
          {tabs.map(t=><button key={t.id} className={`hdr-tab${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
        </div>
      </div>
      {tab==="overview"&&<OverviewTab onLogRide={()=>setLogRide(true)} onGoComp={()=>setTab("components")}/>}
      {tab==="components"&&<ComponentsTab/>}
      {tab==="rides"&&<RidesTab/>}
      {tab==="settings"&&<SettingsTab/>}
      <nav className="nav">
        {tabs.map(t=><button key={t.id} className={`nav-tab${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}><svg viewBox="0 0 24 24">{t.svg}</svg><span className="nav-tab-lbl">{t.label}</span></button>)}
      </nav>
      {logRide&&<RideSheet bikeId={activeBike.id} onClose={()=>setLogRide(false)}/>}
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<AppProvider><App/></AppProvider>);
</script>
</body>
</html>
